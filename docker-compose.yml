version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: studix_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: studixpassword
      POSTGRES_DB: studix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - studix_network

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: studix_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:studixpassword@db:5432/studix?schema=public
      - PORT=3000
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - studix_network

volumes:
  pgdata:

networks:
  studix_network:
    name: studix_network
    driver: bridge
